<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Araz Yazılım - WhatsApp Tema</title>
    <style>
        /* WhatsApp Karanlık Tema Renkleri */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #111b21; 
            margin: 0; 
            padding: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 600px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #0b141a;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* Üst Bilgi Çubuğu */
        header {
            background: #202c33;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: #00a884;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #111b21;
            font-weight: bold;
            font-size: 18px;
        }
        .header-info { display: flex; flex-direction: column; }
        .header-title { color: #e9edef; font-size: 16px; font-weight: 500; }
        .header-status { color: #8696a0; font-size: 13px; }

        /* Rol Seçim Çubuğu (Misafir/Ev Sahibi) */
        #role-area {
            background: #182229;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #313d45;
        }
        #guest-toggle {
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: #00a884;
        }
        #role-label {
            font-size: 13px;
            color: #8696a0;
            cursor: pointer;
            user-select: none;
        }

        /* Mesajlaşma Alanı ve Arka Plan Deseni */
        #chat-box { 
            flex: 1; 
            padding: 20px 15px; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            background-color: #0b141a;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: contain;
            background-attachment: fixed;
        }
        
        /* Mesaj Balonları */
        .message { 
            margin-bottom: 12px; 
            padding: 8px 12px; 
            width: fit-content; 
            max-width: 75%; 
            word-wrap: break-word;
            font-size: 14.5px;
            position: relative;
            line-height: 1.4;
            box-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }
        
        /* Medya (Foto) Tasarımı */
        .message img {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 5px;
            display: block;
        }

        /* Ev Sahibi SABİT SAĞDA */
        .me { 
            background: #005c4b; 
            align-self: flex-end; 
            color: #e9edef; 
            border-radius: 10px 0 10px 10px;
            margin-left: auto;
        }
        /* Misafir SABİT SOLDADA */
        .other { 
            background: #202c33; 
            align-self: flex-start; 
            color: #e9edef; 
            border-radius: 0 10px 10px 10px;
            margin-right: auto;
        }
        
        .sender-name { 
            font-size: 12px; 
            font-weight: 600;
            margin-bottom: 4px; 
            display: block; 
        }
        .me .sender-name { color: #53bdeb; } 
        .other .sender-name { color: #f28b82; } 

        /* Alt Yazma Alanı */
        #input-area { 
            background: #202c33; 
            padding: 10px 15px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        #username { 
            width: 0px; 
            padding: 0; 
            border: none; 
            visibility: hidden;
        }
        
        /* Dosya Ekleme Butonu */
        #attach-btn {
            background: transparent;
            border: none;
            color: #8696a0;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }
        #attach-btn:hover { color: #d1d7db; }
        #file-input { display: none; }

        #message { 
            flex: 1; 
            padding: 12px 15px; 
            border-radius: 20px; 
            border: none; 
            background: #2a3942; 
            color: #d1d7db; 
            outline: none;
            font-size: 15px;
        }
        #message::placeholder { color: #8696a0; }
        
        #send-btn { 
            background: #00a884; 
            color: #111b21; 
            border: none; 
            border-radius: 50%; 
            width: 45px; 
            height: 45px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            transition: 0.2s;
        }
        #send-btn:hover { background: #008f6f; }
        #send-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transform: translateX(-1px) translateY(1px);
        }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <div class="avatar">A</div>
            <div class="header-info">
                <span class="header-title">Araz Yazılım Karargah</span>
                <span class="header-status">çevrimiçi</span>
            </div>
        </header>

        <div id="role-area">
            <div>
                <input type="checkbox" id="guest-toggle">
                <label for="guest-toggle" id="role-label">Ben Misafirim (Karşı Taraf)</label>
            </div>
        </div>

        <div id="chat-box"></div>
        
        <div id="input-area">
            <input type="text" id="username" value="Ev Sahibi" readonly>
            
            <button id="attach-btn" title="Fotoğraf Ekle">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M1.816 15.556v.002c0 1.502.584 2.912 1.646 3.972s2.472 1.647 3.974 1.647a5.58 5.58 0 0 0 3.972-1.645l9.547-9.548c.769-.768 1.147-1.767 1.058-2.817-.079-.968-.548-1.927-1.319-2.698-1.594-1.592-4.068-1.711-5.517-.262l-7.916 7.915c-.881.881-.792 2.25.214 3.261.959.958 2.423 1.053 3.263.215l5.511-5.512c.28-.28.267-.722.053-.936l-.244-.244c-.191-.191-.567-.349-.957.04l-5.506 5.506c-.18.18-.635.127-.976-.214-.098-.097-.576-.613-.213-.973l7.915-7.917c.818-.817 2.267-.699 3.23.262.5.501.802 1.1.849 1.685.051.573-.156 1.111-.589 1.543l-9.547 9.549a3.97 3.97 0 0 1-2.829 1.171 3.975 3.975 0 0 1-2.83-1.173 3.973 3.973 0 0 1-1.172-2.828c0-1.071.415-2.076 1.172-2.83l7.209-7.211c.157-.157.264-.579.028-.814L11.5 4.36a.57.57 0 0 0-.834.018l-7.205 7.207a5.577 5.577 0 0 0-1.645 3.971z"></path>
                </svg>
            </button>
            <input type="file" id="file-input" accept="image/*">

            <input type="text" id="message" placeholder="Bir mesaj yazın">
            <button id="send-btn" title="Gönder">
                <svg viewBox="0 0 24 24">
                    <path d="M1.101 21.757 23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Firebase Yapılandırman (SADECE FIRESTORE KULLANILIYOR)
        const firebaseConfig = {
            apiKey: "AIzaSyA2ZZ7moCVLTi3LjwToDvqPg11e9KVIMgw",
            authDomain: "arazyazilim.firebaseapp.com",
            databaseURL: "https://arazyazilim-default-rtdb.firebaseio.com",
            projectId: "arazyazilim",
            storageBucket: "arazyazilim.firebasestorage.app",
            messagingSenderId: "911734141067",
            appId: "1:911734141067:web:8dd3532898c8ee16ed648e",
            measurementId: "G-93Y65NB4KZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // IMGBB API ANAHTARIN EKLENDİ
        const IMGBB_API_KEY = "4a5dfe7ac9a241ddb9fe98062acd00de";

        const chatBox = document.getElementById("chat-box");
        const messageInput = document.getElementById("message");
        const usernameInput = document.getElementById("username");
        const sendBtn = document.getElementById("send-btn");
        const guestToggle = document.getElementById("guest-toggle");
        
        const attachBtn = document.getElementById("attach-btn");
        const fileInput = document.getElementById("file-input");

        guestToggle.addEventListener("change", () => {
            if (guestToggle.checked) {
                usernameInput.value = "Misafir";
            } else {
                usernameInput.value = "Ev Sahibi";
            }
        });

        // ATAÇ İKONUNA TIKLAYINCA
        attachBtn.addEventListener("click", () => {
            fileInput.click();
        });

        // FOTOĞRAF SEÇİLDİĞİNDE ARKA KAPIDAN (IMGBB) YÜKLE
        fileInput.addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (!file.type.startsWith("image/")) {
                alert("Bu kartsız sistemde sadece fotoğraf gönderebilirsin koçum!");
                return;
            }

            if (IMGBB_API_KEY === "SENIN_IMGBB_API_ANAHTARIN_BURAYA") {
                alert("Önce koda ImgBB API anahtarını eklemelisin!");
                return;
            }

            messageInput.placeholder = "Fotoğraf yükleniyor, bekle...";
            messageInput.disabled = true;
            sendBtn.disabled = true;

            try {
                // Fotoğrafı ImgBB sunucularına gönderiyoruz
                const formData = new FormData();
                formData.append("image", file);

                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });
                
                const data = await response.json();

                if (data.success) {
                    const downloadURL = data.data.url;
                    const user = usernameInput.value;
                    const myRole = guestToggle.checked ? "guest" : "host"; 

                    // Fotoğrafın linkini kendi Firebase Firestore'umuza (mesaj olarak) kaydediyoruz
                    await addDoc(collection(db, "messages"), {
                        text: messageInput.value, 
                        fileUrl: downloadURL,
                        user: user,
                        role: myRole, 
                        createdAt: serverTimestamp()
                    });
                    messageInput.value = ""; 
                } else {
                    alert("Yükleme başarısız oldu.");
                }
            } catch (error) {
                console.error("Yükleme hatası:", error);
                alert("Bağlantı koptu, fotoğraf yüklenemedi.");
            }

            messageInput.placeholder = "Bir mesaj yazın";
            messageInput.disabled = false;
            sendBtn.disabled = false;
            fileInput.value = ""; 
            messageInput.focus();
        });

        // NORMAL METİN MESAJI GÖNDERME
        sendBtn.addEventListener("click", async () => {
            const text = messageInput.value;
            const user = usernameInput.value;
            const myRole = guestToggle.checked ? "guest" : "host"; 
            
            if (text.trim() === "") return;

            await addDoc(collection(db, "messages"), {
                text: text,
                user: user,
                role: myRole, 
                createdAt: serverTimestamp()
            });
            
            messageInput.value = ""; 
            messageInput.focus(); 
        });

        messageInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter" && !messageInput.disabled) {
                sendBtn.click();
            }
        });

        // MESAJLARI CANLI EKRANA YANSITMA
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snapshot) => {
            chatBox.innerHTML = ""; 

            snapshot.forEach((doc) => {
                const data = doc.data();
                const msgDiv = document.createElement("div");
                msgDiv.classList.add("message");
                
                const msgRole = data.role || "host";
                
                if (msgRole === "host") {
                    msgDiv.classList.add("me");
                } else {
                    msgDiv.classList.add("other");
                }
                
                let content = `<span class="sender-name">${data.user}</span>`;
                
                // EĞER MESAJDA FOTOĞRAF VARSA EKRANA BASTIR
                if (data.fileUrl) {
                    content += `<img src="${data.fileUrl}" alt="Gönderilen Fotoğraf" />`;
                }
                
                // EĞER METİN VARSA ALTINA METNİ YAZ
                if (data.text) {
                    content += `<span>${data.text}</span>`;
                }

                msgDiv.innerHTML = content;
                chatBox.appendChild(msgDiv);
            });
            
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
